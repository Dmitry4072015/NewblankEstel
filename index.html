<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>ESTEL — Бланк заказов</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fc 0%, #eef1f7 100%); padding: 12px 8px; display: flex; justify-content: center; min-height: 100vh; }
        .order-container { max-width: 1400px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 20px 40px -8px rgba(0,20,60,0.15); overflow: hidden; }
        .browser-banner { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .browser-banner-text { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .browser-banner-btn { background: #ffd700; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .browser-banner-close { opacity: 0.6; cursor: pointer; font-size: 22px; padding: 0 4px; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo h1 { font-size: 36px; font-weight: 700; letter-spacing: 4px; color: white; text-transform: uppercase; cursor: pointer; }
        .logo span { color: #c9a227; font-size: 12px; letter-spacing: 2px; }
        .header-badge { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 40px; color: #f0e6d2; font-size: 13px; }
        .content { padding: 20px 16px 28px; }
        .control-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e9edf4; align-items: center; justify-content: space-between; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn { padding: 10px 16px; border-radius: 30px; font-size: 13px; font-weight: 500; border: 1.5px solid #dde3ed; background: white; color: #475569; cursor: pointer; }
        .btn:hover { background: #f1f5f9; }
        .btn-primary { background: #1d4ed8; border-color: #1d4ed8; color: white; }
        .btn-success { background: #0d9488; border-color: #0d9488; color: white; }
        .btn-warning { background: #d97706; border-color: #d97706; color: white; }
        .category-section { margin-bottom: 16px; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; }
        .category-header { padding: 14px 16px; background: #fafcff; border-bottom: 1px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; }
        .category-icon { margin-right: 10px; color: #1d4ed8; font-size: 14px; }
        .category-title { font-weight: 600; font-size: 16px; color: #1e293b; flex: 1; }
        .category-count { background: #e2e8f0; padding: 3px 10px; border-radius: 30px; font-size: 12px; margin-left: 10px; }
        .category-summary { font-size: 13px; color: #059669; font-weight: 500; margin-left: 12px; }
        .category-content { overflow-x: auto; }
        .category-content.hidden { display: none; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 14px; }
        th { background: #f8fafd; color: #64748b; font-weight: 500; padding: 10px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        td { padding: 10px 8px; border-bottom: 1px solid #edf2f7; }
        .nomenclature-cell { font-weight: 500; }
        .article-cell { font-family: monospace; font-size: 13px; color: #64748b; }
        .barcode-cell { font-family: monospace; font-size: 13px; color: #64748b; }
        .price-cell { font-weight: 600; white-space: nowrap; }
        .qty-input { width: 80px; padding: 9px 6px; border: 1.5px solid #d7dfe9; border-radius: 12px; font-size: 14px; text-align: center; }
        .qty-input:focus { outline: none; border-color: #1d4ed8; }
        .sum-cell { font-weight: 600; color: #075985; white-space: nowrap; }
        body.hide-barcode .barcode-col, body.hide-barcode .barcode-cell { display: none; }
        .summary-section { display: flex; justify-content: flex-end; margin-top: 24px; }
        .summary-card { background: #f9fbfe; border-radius: 18px; padding: 18px 22px; width: 100%; max-width: 360px; border: 1px solid #e2eaf2; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 2px dashed #b9c7da; font-weight: 700; font-size: 20px; }
        .order-form-section { margin-top: 24px; padding: 20px 18px; background: #f8fafc; border-radius: 18px; border: 1px solid #e2e8f0; }
        .order-form-section h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .form-group { flex: 1 1 200px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #dde3ed; border-radius: 14px; font-size: 15px; }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .action-buttons .btn { flex: 1 1 0; min-width: 120px; padding: 14px 18px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .footer-note { margin-top: 16px; font-size: 12px; color: #5e7180; text-align: center; }
        #secretExcelBtn { display: none; background: #10b981; color: white; padding: 6px 12px; border-radius: 30px; border: none; font-size: 14px; cursor: pointer; margin-left: 12px; }
        @media print { body { background: white; padding: 0; } .browser-banner, .control-bar, .btn, .action-buttons, .order-form-section, .footer-note, #secretExcelBtn { display: none !important; } .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; } tbody tr[style*="display: none"] { display: none !important; } .category-section[style*="display: none"] { display: none !important; } }
        @media (max-width: 600px) { .qty-input { width: 70px; } }
    </style>
</head>
<body>
<div class="order-container">
    <div class="browser-banner" id="browserBanner" style="display: none;">
        <div class="browser-banner-text"><span>🌐</span> Для оформления заказа перейдите в браузер</div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="browser-banner-btn" onclick="showBrowserInstructions()">Перейти в браузер →</button>
            <span class="browser-banner-close" onclick="closeBanner()">✕</span>
        </div>
    </div>
    <div class="header">
        <div class="header-content">
            <div class="logo"><h1>ESTEL</h1><span>professional</span></div>
            <div class="header-badge"><strong>Бланк заказа</strong> • оптовый прайс</div>
            <input type="file" id="excelInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="loadFromExcel(this)">
            <button id="secretExcelBtn" onclick="document.getElementById('excelInput').click()">📂 Загрузить Excel</button>
        </div>
    </div>
    <div class="content">
        <div class="control-bar">
            <div class="btn-group">
                <button class="btn" id="toggleBarcodeBtn" onclick="toggleBarcode()"><span id="barcodeIcon">🔲</span> Штрихкод</button>
                <button class="btn" onclick="expandAll()"><span>🔽</span> Развернуть</button>
                <button class="btn" onclick="collapseAll()"><span>🔼</span> Свернуть</button>
            </div>
        </div>
        
        <div id="categoriesContainer"></div>
        
        <div class="summary-section">
            <div class="summary-card">
                <div class="summary-line"><span>Позиций в заказе</span><span id="itemsCount">0</span></div>
                <div class="summary-line"><span>Всего единиц</span><span id="totalQty">0</span></div>
                <div class="summary-total"><span>Итого</span><span id="totalPrice">0 ₽</span></div>
            </div>
        </div>
        <div class="order-form-section">
            <h3>📋 Данные для заказа</h3>
            <div class="form-row">
                <div class="form-group"><label>👤 Менеджер</label><input type="text" id="managerName" placeholder="Иванова Анна"></div>
                <div class="form-group"><label>🏢 Контрагент</label><input type="text" id="contractorName" placeholder="ООО «Салон Красоты»"></div>
                <div class="form-group"><label>📱 Телефон</label><input type="tel" id="phoneNumber" placeholder="+7 (___) ___-__-__"></div>
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn" onclick="resetOrder()"><span>🔄</span> Очистить</button>
            <button class="btn btn-warning" onclick="printOrder()"><span>🖨️</span> Печать</button>
            <button class="btn btn-primary" onclick="saveAsPDF()"><span>📄</span> Сохранить PDF</button>
            <button class="btn btn-success" onclick="submitOrder()"><span>📤</span> Отправить</button>
        </div>
        <div class="footer-note">* Заполните контакты, введите количество и отправьте заказ</div>
    </div>
</div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    // ========== НАСТРОЙКИ ОТПРАВКИ ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwtI4d80z9BOxHEiwx0cvej_85zxXVTfNkpUEe6uCceHluq8gu0es_vboSSgH5BmgJ/exec";
    
    // ========== ОПРЕДЕЛЕНИЕ БРАУЗЕРА ==========
    function isInWebView() {
        var ua = navigator.userAgent;
        if (ua.includes('Telegram') || ua.includes('Twitter') || (ua.includes('Safari') && !ua.includes('Chrome') && window.navigator.standalone === false && !window.location.href.startsWith('http'))) {
            return !(window.location.protocol === 'http:' || window.location.protocol === 'https:');
        }
        return false;
    }
    var banner = document.getElementById('browserBanner');
    if (isInWebView()) banner.style.display = 'flex';
    function showBrowserInstructions() { alert('📱 Откройте в Safari или Chrome для отправки заказа'); }
    function closeBanner() { banner.style.display = 'none'; }
    
    // ========== СЕКРЕТНАЯ КНОПКА ==========
    let secretClickCount = 0, secretTimer = null;
    document.querySelector('.logo').addEventListener('click', () => {
        secretClickCount++;
        if (secretTimer) clearTimeout(secretTimer);
        secretTimer = setTimeout(() => { secretClickCount = 0; }, 800);
        if (secretClickCount === 5) {
            document.getElementById('secretExcelBtn').style.display = 'inline-flex';
            secretClickCount = 0;
            clearTimeout(secretTimer);
        }
    });
    
    // ========== ОСНОВНЫЕ ФУНКЦИИ ==========
    function getPriceFromRow(row) {
        var price = parseFloat(row.getAttribute('data-price'));
        if (isNaN(price)) {
            var priceCell = row.querySelector('.price-cell');
            if (priceCell) {
                var priceText = priceCell.textContent.replace(/[^\d]/g, '');
                price = parseFloat(priceText) || 0;
            }
        }
        return price;
    }
    
    function updateRowSum(input) {
        var row = input.closest('tr');
        var price = getPriceFromRow(row);
        var qty = parseInt(input.value) || 0;
        if (qty < 0) qty = 0;
        if (qty > 9999) qty = 9999;
        input.value = qty;
        var sum = price * qty;
        row.querySelector('.sum-cell').textContent = sum.toLocaleString('ru-RU') + ' ₽';
        updateCategorySummary(row.closest('.category-section'));
        calculateTotal();
    }
    
    function updateCategorySummary(section) {
        if (!section) return;
        var rows = section.querySelectorAll('tbody tr');
        var catSum = 0, catQty = 0;
        rows.forEach(function(row) {
            var input = row.querySelector('.qty-input');
            var qty = parseInt(input.value) || 0;
            if (qty > 0) {
                catQty += qty;
                catSum += getPriceFromRow(row) * qty;
            }
        });
        var summary = section.querySelector('.category-summary');
        if (summary) summary.textContent = catQty > 0 ? catQty + ' шт · ' + catSum.toLocaleString('ru-RU') + ' ₽' : '';
    }
    
    function calculateTotal() {
        var totalSum = 0, totalQty = 0, itemsCount = 0;
        document.querySelectorAll('tbody tr').forEach(function(row) {
            var input = row.querySelector('.qty-input');
            var qty = parseInt(input.value) || 0;
            if (qty > 0) {
                itemsCount++;
                totalQty += qty;
                totalSum += getPriceFromRow(row) * qty;
            }
        });
        document.getElementById('itemsCount').textContent = itemsCount;
        document.getElementById('totalQty').textContent = totalQty;
        document.getElementById('totalPrice').textContent = totalSum.toLocaleString('ru-RU') + ' ₽';
        document.querySelectorAll('.category-section').forEach(function(s) { updateCategorySummary(s); });
    }
    
    function resetOrder() {
        document.querySelectorAll('.qty-input').forEach(function(input) {
            input.value = 0;
            input.closest('tr').querySelector('.sum-cell').textContent = '0 ₽';
        });
        calculateTotal();
    }
    
    function toggleCategory(header) {
        var content = header.nextElementSibling;
        var icon = header.querySelector('.category-icon');
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.textContent = '▼';
        } else {
            content.classList.add('hidden');
            icon.textContent = '▶';
        }
    }
    
    function expandAll() { document.querySelectorAll('.category-content').forEach(c => c.classList.remove('hidden')); document.querySelectorAll('.category-icon').forEach(i => i.textContent = '▼'); }
    function collapseAll() { document.querySelectorAll('.category-content').forEach(c => c.classList.add('hidden')); document.querySelectorAll('.category-icon').forEach(i => i.textContent = '▶'); }
    
    var barcodeHidden = false;
    function toggleBarcode() {
        barcodeHidden = !barcodeHidden;
        document.body.classList.toggle('hide-barcode', barcodeHidden);
        var icon = document.getElementById('barcodeIcon');
        icon.textContent = barcodeHidden ? '🔳' : '🔲';
        document.getElementById('toggleBarcodeBtn').innerHTML = '<span id="barcodeIcon">' + icon.textContent + '</span> Штрихкод';
    }
    
    function hideEmptyItems() {
        document.querySelectorAll('tbody tr').forEach(function(row) {
            var input = row.querySelector('.qty-input');
            var qty = parseInt(input.value) || 0;
            row.style.display = qty === 0 ? 'none' : '';
        });
        document.querySelectorAll('.category-section').forEach(function(section) {
            var hasVisible = false;
            section.querySelectorAll('tbody tr').forEach(row => { if (row.style.display !== 'none') hasVisible = true; });
            section.style.display = hasVisible ? '' : 'none';
        });
        expandAll();
    }
    
    function restoreAllItems() { 
        document.querySelectorAll('tbody tr').forEach(row => row.style.display = ''); 
        document.querySelectorAll('.category-section').forEach(section => section.style.display = ''); 
    }
    
    function printOrder() { 
        calculateTotal(); 
        hideEmptyItems(); 
        window.print(); 
        setTimeout(() => { restoreAllItems(); }, 100); 
    }
    function saveAsPDF() { printOrder(); }
    
    // ========== СОЗДАНИЕ EXCEL ФАЙЛА ==========
    function createExcelFile(items, manager, contractor, phone) {
        const data = [["Номенклатура", "Артикул", "Штрихкод", "Цена", "Количество", "Сумма"]];
        let total = 0;
        
        items.forEach(item => {
            const sum = item.price * item.qty;
            total += sum;
            data.push([item.name, item.article, item.barcode, item.price, item.qty, sum]);
        });
        
        data.push(["", "", "", "", "ИТОГО:", total]);
        data.push(["", "", "", "", "Менеджер:", manager]);
        data.push(["", "", "", "", "Контрагент:", contractor]);
        data.push(["", "", "", "", "Телефон:", phone]);
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Заказ");
        
        const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        return excelBuffer;
    }
    
    // ========== ОТПРАВКА В TELEGRAM ==========
    async function sendToTelegram(items, manager, contractor, phone) {
        const excelBuffer = createExcelFile(items, manager, contractor, phone);
        
        // Конвертируем в base64
        const base64 = btoa(String.fromCharCode.apply(null, new Uint8Array(excelBuffer)));
        
        // Текст для отправки
        const total = items.reduce((s, i) => s + (i.price * i.qty), 0);
        const totalQty = items.reduce((s, i) => s + i.qty, 0);
        const text = `<b>📦 ЗАКАЗ ESTEL</b>\n\n<b>👤 Менеджер:</b> ${manager}\n<b>🏢 Контрагент:</b> ${contractor}\n<b>📱 Телефон:</b> ${phone}\n<b>📦 Позиций:</b> ${items.length}\n<b>📦 Единиц:</b> ${totalQty}\n<b>💰 Итого:</b> ${total.toLocaleString('ru-RU')} ₽\n\n📎 Файл с заказом прикреплён ниже`;
        
        const formData = new URLSearchParams();
        formData.append('text', text);
        formData.append('fileName', `order_${Date.now()}.xlsx`);
        formData.append('fileData', base64);
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            
            if (response.ok) {
                alert("✅ Заказ отправлен в Telegram!");
                return true;
            } else {
                alert("❌ Ошибка отправки. Код: " + response.status);
                return false;
            }
        } catch (error) {
            alert("❌ Ошибка соединения: " + error.message);
            return false;
        }
    }
    
    function submitOrder() {
        var manager = document.getElementById('managerName').value.trim();
        var contractor = document.getElementById('contractorName').value.trim();
        var phone = document.getElementById('phoneNumber').value.trim();
        if (!manager) { alert('❌ Укажите менеджера'); return; }
        if (!contractor) { alert('❌ Укажите контрагента'); return; }
        if (!phone) { alert('❌ Укажите номер телефона'); return; }
        
        var items = [];
        document.querySelectorAll('.category-section').forEach(function(section) {
            var cat = section.querySelector('.category-title').textContent;
            section.querySelectorAll('tbody tr').forEach(function(row) {
                var input = row.querySelector('.qty-input');
                var qty = parseInt(input.value) || 0;
                if (qty > 0) {
                    var price = getPriceFromRow(row);
                    items.push({
                        cat: cat,
                        name: row.querySelector('.nomenclature-cell').textContent,
                        article: row.querySelector('.article-cell').textContent,
                        barcode: row.querySelector('.barcode-cell').textContent,
                        price: price,
                        qty: qty
                    });
                }
            });
        });
        
        if (items.length === 0) { alert('❌ Добавьте товары'); return; }
        
        sendToTelegram(items, manager, contractor, phone);
    }
    
    function setupQuantityInputs() {
        document.addEventListener('focusin', function(e) {
            if (e.target && e.target.classList && e.target.classList.contains('qty-input')) {
                if (e.target.value === '0') e.target.value = '';
            }
        });
        document.addEventListener('focusout', function(e) {
            if (e.target && e.target.classList && e.target.classList.contains('qty-input')) {
                if (e.target.value === '') e.target.value = 0;
                updateRowSum(e.target);
            }
        });
    }
    
    // ========== КАТЕГОРИИ ==========
    const categoriesMap = new Map();
    
    function addNewCategory(categoryName) {
        if (categoriesMap.has(categoryName)) {
            return categoriesMap.get(categoryName);
        }
        
        const newId = Date.now() + Math.random();
        const categorySection = document.createElement('div');
        categorySection.className = 'category-section';
        categorySection.setAttribute('data-category', newId);
        categorySection.innerHTML = `
            <div class="category-header" onclick="toggleCategory(this)">
                <span class="category-icon">▼</span>
                <span class="category-title">📦 ${escapeHtml(categoryName)}</span>
                <span class="category-count">0</span>
                <span class="category-summary" id="cat-summary-${newId}"></span>
            </div>
            <div class="category-content">
                <table>
                    <thead><tr><th>Номенклатура</th><th>Артикул</th><th class="barcode-col">Штрихкод</th><th>Цена (₽)</th><th>Заказ</th><th>Сумма (₽)</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        `;
        document.getElementById('categoriesContainer').appendChild(categorySection);
        categoriesMap.set(categoryName, categorySection);
        return categorySection;
    }
    
    function addProductToCategory(categoryName, name, article, barcode, price) {
        const categorySection = addNewCategory(categoryName);
        const tbody = categorySection.querySelector('tbody');
        
        const row = document.createElement('tr');
        row.setAttribute('data-price', price);
        row.innerHTML = `
            <td class="nomenclature-cell">${escapeHtml(name)}</td>
            <td class="article-cell">${escapeHtml(article)}</td>
            <td class="barcode-cell">${escapeHtml(barcode)}</td>
            <td class="price-cell">${price.toLocaleString('ru-RU')} ₽</td>
            <td><input type="number" min="0" max="9999" value="0" class="qty-input" oninput="updateRowSum(this)" inputmode="numeric"></td>
            <td class="sum-cell">0 ₽</td>
        `;
        tbody.appendChild(row);
        
        const countSpan = categorySection.querySelector('.category-count');
        const currentCount = parseInt(countSpan.textContent) || 0;
        countSpan.textContent = currentCount + 1;
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    // ========== ЗАГРУЗКА ИЗ EXCEL ==========
    function loadFromExcel(input) {
        const file = input.files[0];
        if (!file) { alert("Файл не выбран"); return; }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            
            document.getElementById('categoriesContainer').innerHTML = '';
            categoriesMap.clear();
            
            let currentCategory = null;
            let addedCount = 0;
            let inDataSection = false;
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 1) continue;
                
                const col0 = (row[0] || "").toString().trim();
                const col1 = (row[1] || "").toString().trim();
                const col2 = (row[2] || "").toString().trim();
                const col3 = parseFloat(row[3]) || 0;
                
                if (col0 === "Номенклатура") {
                    inDataSection = true;
                    continue;
                }
                if (!inDataSection) continue;
                if (col0 === "Номенклатура" || col0 === "Артикул" || 
                    col0.includes("Оформите Бонусный") || col0.includes("Ваш Заказ") ||
                    col0 === "" || col0 === "Итого" || col0 === "Осталось Бонусов") {
                    continue;
                }
                
                const isCategory = (col0 && !col1 && !col2 && col3 === 0 && !col0.includes("NEW!!"));
                if (isCategory) {
                    currentCategory = col0.replace(/NEW!!/gi, '').trim();
                    addNewCategory(currentCategory);
                    continue;
                }
                
                if (currentCategory && col0 && (col1 || col2) && col3 > 0) {
                    addProductToCategory(currentCategory, col0, col1, col2, col3);
                    addedCount++;
                }
            }
            
            alert(`✅ Загружено ${addedCount} товаров в ${categoriesMap.size} категориях`);
            calculateTotal();
            expandAll();
        };
        reader.onerror = function() { alert("Ошибка чтения файла"); };
        reader.readAsArrayBuffer(file);
        input.value = '';
    }
